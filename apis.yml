apis:
  - aid: clip:clip-checkout-redirect-api
    name: Clip Checkout Redirect API
    description: >-
      Hosted checkout flow that redirects shoppers to a Clip-hosted payment
      page to capture card data and complete the charge. Returns the
      authorized payment back to the merchant via redirect plus a postback
      webhook. Lowest PCI scope option for online merchants.
    humanURL: https://developer.clip.mx/docs/api-de-checkout
    tags:
      - Payments
      - Checkout
      - Hosted Payment Page
    properties:
      - type: Documentation
        url: https://developer.clip.mx/docs/api-de-checkout
      - type: Documentation
        url: https://developer.clip.mx/reference/referencia-postback-webhook
  - aid: clip:clip-checkout-transparente-api
    name: Clip Checkout Transparente API
    description: >-
      Server-side payment processing that tokenizes card data via the Card
      Token API and charges through the Payments API while keeping the
      checkout experience entirely on the merchant's site. Supports 3DS
      authentication, authorization + capture, USD payments, monthly
      installments (MSI), and SPEI bank transfers.
    humanURL: https://developer.clip.mx/docs/api-de-checkout-transparente
    tags:
      - Payments
      - Checkout
      - Tokenization
      - 3DS
      - SPEI
      - MSI
    properties:
      - type: Documentation
        url: https://developer.clip.mx/docs/api-de-checkout-transparente
      - type: Documentation
        url: https://developer.clip.mx/reference/introduccion-al-checkout-transparente
      - type: SDK
        url: https://developer.clip.mx/reference/introduccion-al-sdk-de-checkout-transparente
  - aid: clip:clip-transactions-api
    name: Clip Transactions API
    description: >-
      Query individual transactions and list transactions across a date range
      from a Clip merchant account — used for reconciliation across both
      online Checkout and physical PinPad/POS sales.
    humanURL: https://developer.clip.mx/docs/api-de-transacciones
    tags:
      - Payments
      - Transactions
      - Reporting
      - Reconciliation
    properties:
      - type: Documentation
        url: https://developer.clip.mx/docs/api-de-transacciones
      - type: Documentation
        url: https://developer.clip.mx/docs/conciliacion-de-transacciones-apis-1
  - aid: clip:clip-deposits-api
    name: Clip Deposits API
    description: >-
      Retrieve detailed deposit reports and deposit summaries for the
      merchant's Clip Cuenta over a date window (up to 90 days). Use to
      reconcile payouts to the merchant's bank against captured transactions.
    humanURL: https://developer.clip.mx/docs/api-de-depositos
    tags:
      - Payments
      - Deposits
      - Settlements
      - Reporting
    properties:
      - type: Documentation
        url: https://developer.clip.mx/docs/api-de-depositos
  - aid: clip:clip-refunds-api
    name: Clip Refunds API
    description: >-
      Create full or partial refunds against previously approved Clip
      payments and query refund status. Supports both Checkout and PinPad
      sourced transactions.
    humanURL: https://developer.clip.mx/reference/introduccion-api-de-reembolsos
    tags:
      - Payments
      - Refunds
    properties:
      - type: Documentation
        url: https://developer.clip.mx/reference/introduccion-api-de-reembolsos
  - aid: clip:clip-pinpad-api
    name: Clip PinPad API
    description: >-
      Drive a Clip PinPad device (fixed, high-volume terminal) from a
      merchant's own POS software — initiate card-present sales, query
      device status, capture authorizations, and reconcile against the
      Transactions API.
    humanURL: https://developer.clip.mx/reference/introducci%C3%B3n-a-la-api-de-pinpad
    tags:
      - Payments
      - Point of Sale
      - PinPad
      - Card Present
      - Hardware
    properties:
      - type: Documentation
        url: https://developer.clip.mx/reference/introducci%C3%B3n-a-la-api-de-pinpad
      - type: SDK
        url: https://developer.clip.mx/reference/introducci%C3%B3n-al-sdk-terminal
      - type: SDK
        url: https://github.com/ClipMX/mobile.android.blaze.pinpad.sdk
