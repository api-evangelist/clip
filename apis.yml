aid: clip
name: Clip
description: >-
  Clip (legal name Payclip) is a Mexico City-based fintech and SMB acquirer
  often described as the Square equivalent in Mexico. Founded in 2012, Clip
  enables merchants of all sizes to accept card, contactless, and QR payments
  through a family of mobile point-of-sale (mPOS) terminals — Clip Plus 2,
  Clip Pro 2, Clip Ultra, Clip Total 3, and the high-volume Clip PinPad — as
  well as Tap to Pay on iOS/Android smartphones, an online Checkout payment
  gateway, payment links, and the Clip Cuenta digital business account with
  same-day settlement and SMB loans. Clip operates the developer portal
  developer.clip.mx, which publishes the Checkout Redirect, Checkout
  Transparente, Transactions, Deposits, Refunds, and PinPad APIs along with
  the Checkout Transparente SDK and a Terminal SDK for embedding card
  acceptance into third-party POS apps. The company is backed by strategic
  investors including American Express Ventures, Banorte, Capital Group, and
  Morgan Stanley, and is consistently ranked among Mexico's top private
  fintech employers.
